<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SA Tools</title>
  <style>
    @font-face { font-family: 'bebasneue'; src: url('./BebasNeue-Regular.ttf') format('truetype'); }
    @font-face { font-family: 'beckett'; src: url('./beckett.ttf') format('truetype'); }
    @font-face { font-family: 'bankgothic'; src: url('./bankgothic-regular.ttf') format('truetype'); }
    
    :root {
      --menu-color-default: rgb(120,145,190);
      --menu-color-active: rgb(163,196,239);
    }

    body {
      margin: 0;
      background: #000;
      min-height: 100vh;
      font-family: 'bankgothic', sans-serif;
      overflow: hidden;
    }

    /* Gaya untuk Loading Screen */
    #initialLoader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: opacity 1s ease;
    }
    .spinner {
      width: 35px;
      height: 35px;
      border: 3px solid rgba(163, 196, 239, 0.2);
      border-top-color: var(--menu-color-active);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 20px;
    }
    #loadStatus {
      font-size: 14px;
      color: var(--menu-color-default);
      margin-top: 10px;
      letter-spacing: 1px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Struktur Menu Utama (Tetap sesuai file asli) */
    #title { position: absolute; top: 20px; left: 20px; font-family: 'beckett', serif; font-size: clamp(36px, 6vw, 60px); color: var(--menu-color-active); text-shadow: 2px 2px 4px #000; white-space: nowrap; }
    #cornerLogo { position: absolute; top: 0; right: 0; transition: opacity 0.3s ease; }
    #cornerLogo.back8 { height: 100px; }
    #cornerLogo.back3, #cornerLogo.back6, #cornerLogo.back2 { height: 200px; }

    .menu { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%) translateX(-11px); font-size: clamp(22px, 4vw, 32px); font-weight: bold; text-transform: uppercase; line-height: 2.2em; white-space: nowrap; display: none; }
    .menu.active { display: block; }
    .menu-item { position: relative; cursor: pointer; color: var(--menu-color-default); transition: color 0.2s; user-select: none; text-align: center; padding-left: 30px; line-height: 2.0em; transform: translateY(-30px); }
    .menu-item.active { color: var(--menu-color-active); }
    
    .menu-item img.arrow { display: none; position: absolute; left: -10px; top: 85%; transform: translateY(-50%); height: 70px; }
    .menu-item.active img.arrow { display: inline-block; }

    /* Area Tools & Options Position */
    #toolsMenu { left: 40%; text-align: left; }
    #optionsMenu, #creditsMenu { left: 50%; text-align: left; }

    .back-btn { position: absolute; bottom: 100px; right: 40px; font-size: 28px; cursor: pointer; color: var(--menu-color-default); display: none; padding-left: 30px; }
    .back-btn.active { color: var(--menu-color-active); }
    .back-btn.active .back-arrow { display: inline-block; }
    .back-arrow { height: 70px; position: absolute; left: -10px; top: -50%; transform: translateY(10%); display: none; }

    #footerBrand { position: absolute; bottom: 150px; left: 50%; transform: translateX(-45%); font-family: 'bebasneue', sans-serif; font-size: 10px; color: var(--menu-color-active); letter-spacing: 2px; animation: rgbColor 5s linear infinite; }
    @keyframes rgbColor { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
  </style>
</head>
<body>

  <div id="initialLoader">
    <div style="font-size: 24px; color: var(--menu-color-active); font-family: 'bankgothic', sans-serif;">loading...</div>
    <div class="spinner"></div>
    <div id="loadStatus">Mempersiapkan Aset...</div>
  </div>

  <img id="touchCursor" src="Cursor.png" style="position: absolute; width: 20px; height: 20px; pointer-events: none; display: none; z-index: 9999;">
  <div id="footerBrand">- TwentySeven -</div>
  <div id="title">Main Menu</div>
  <img src="back8.png" id="cornerLogo" class="back8" alt="Logo" />

  <audio id="musicAudio" loop><source src="Music.mp4" type="audio/mp4"></audio>
  <audio id="creditsAudio" loop><source src="Credits.mp3" type="audio/mp3"></audio>

  <div id="mainMenu" class="menu active">
    <div class="menu-item" onclick="openTools()"><img src="arrow.png" class="arrow" alt=">"> Select Tools</div>
    <div class="menu-item" onclick="openOptions()"><img src="arrow.png" class="arrow" alt=">"> Options</div>
    <div class="menu-item" onclick="openCredits()"><img src="arrow.png" class="arrow" alt=">"> Credits</div>
  </div>

  <div id="toolsMenu" class="menu">
    <div class="menu-item" onclick="location.href='Transparent image.html'"><img src="arrow.png" class="arrow" alt=">"> Transparan Image</div>
    <div class="menu-item" onclick="location.href='Crashlog.html'"><img src="arrow.png" class="arrow" alt=">"> Crashlog Reader</div>
  </div>

  <div id="universalBack" class="back-btn" onclick="backToMain()">
    <img src="arrow.png" class="arrow back-arrow" alt=">"> Back
  </div>

  <script>
    const allAssets = [
      "back8.png", "back3.png", "back6.png", "back2.png", 
      "arrow.png", "Cursor.png"
    ];

    let loadedCount = 0;
    const loader = document.getElementById('initialLoader');
    const statusText = document.getElementById('loadStatus');

    // 1. PRE-LOAD SEMUA GAMBAR
    function preloadAll() {
      allAssets.forEach(src => {
        const img = new Image();
        img.src = src;
        img.onload = img.onerror = () => {
          loadedCount++;
          statusText.textContent = `Memuat: ${Math.floor((loadedCount / allAssets.length) * 100)}%`;
          if (loadedCount === allAssets.length) {
            finishLoading();
          }
        };
      });
    }

    function finishLoading() {
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
          // Mulai musik jika diizinkan browser
          document.getElementById('musicAudio').play().catch(() => {});
        }, 1000);
      }, 1000);
    }

    // 2. LOGIKA PERPINDAHAN MENU (DENGAN PERBAIKAN DELAY GAMBAR)
    const title = document.getElementById('title');
    const logo = document.getElementById('cornerLogo');
    const backBtn = document.getElementById('universalBack');

    function hideAllMenus() {
      document.querySelectorAll('.menu').forEach(m => m.classList.remove('active'));
    }

    function openTools() {
      hideAllMenus();
      document.getElementById('toolsMenu').classList.add('active');
      title.textContent = "Tools";
      logo.src = "back3.png"; 
      logo.className = "back3";
      backBtn.style.display = "block";
    }

    function openOptions() {
      hideAllMenus();
      // Tambahkan logika menu options kamu di sini jika ada
      title.textContent = "Options";
      logo.src = "back6.png";
      logo.className = "back6";
      backBtn.style.display = "block";
    }

    function openCredits() {
      hideAllMenus();
      title.textContent = "Credits";
      logo.src = "back2.png";
      logo.className = "back2";
      backBtn.style.display = "block";
    }

    function backToMain() {
      hideAllMenus();
      document.getElementById('mainMenu').classList.add('active');
      title.textContent = "Main Menu";
      logo.src = "back8.png";
      logo.className = "back8";
      backBtn.style.display = "none";
    }

    // Jalankan Preload
    preloadAll();
  </script>
</body>
</html>
